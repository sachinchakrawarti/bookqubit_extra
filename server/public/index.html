<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookQubit Server</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      width: 500px;
      max-width: 90%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 50px;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .footer {
      margin-top: 25px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 BookQubit</h1>
    <p>Backend Server is Running Successfully</p>

    <div class="status">
      🟢 Online
    </div>

    <div class="footer">
      Express.js + Node.js Server
    </div>
  </div>
</body>
</html>
